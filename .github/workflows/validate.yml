name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Install skills-ref
        run: uv tool install git+https://github.com/agentskills/agentskills.git#subdirectory=skills-ref

      - name: Validate all skills
        run: |
          # Find all directories containing SKILL.md and validate them
          failed=0
          for dir in */; do
            if [ -f "${dir}SKILL.md" ]; then
              echo "::group::Validating ${dir%/}"
              if ! skills-ref validate "${dir}"; then
                failed=1
              fi
              echo "::endgroup::"
            fi
          done
          exit $failed
