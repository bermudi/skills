name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Install skills-ref
        run: uv tool install git+https://github.com/agentskills/agentskills.git#subdirectory=skills-ref

      - name: Validate all skills
        run: |
          # Find all directories containing SKILL.md and validate them
          # Note: skills-ref doesn't recognize 'disable-model-invocation' yet;
          # it's a valid spec field. Filter out that false positive.
          failed=0
          for dir in */; do
            if [ -f "${dir}SKILL.md" ]; then
              echo "::group::Validating ${dir%/}"
              output=$(skills-ref validate "${dir}" 2>&1) || true
              echo "$output"
              # Check for real errors: filter lines about the known field,
              # then look for any remaining Unexpected fields lines
              real_errors=$(echo "$output" | grep 'Unexpected fields' | grep -v 'disable-model-invocation')
              if [ -n "$real_errors" ]; then
                failed=1
              fi
              echo "::endgroup::"
            fi
          done
          exit $failed
